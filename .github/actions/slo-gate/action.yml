name: SLO Autopilot gate
description: >-
  Block a deploy when a service is out of error budget or burning it fast.
  Wraps `slo-autopilot gate`; the step fails (exit 1) when the gate blocks.

inputs:
  spec:
    description: Path to the SLO spec file.
    required: true
  prometheus-url:
    description: Base URL of the Prometheus to query (e.g. https://prom.internal).
    required: true
  policy:
    description: "Burn-rate policy: standard | fast."
    required: false
    default: standard
  min-remaining:
    description: Block if remaining error budget is below this fraction (0..1).
    required: false
    default: "0"
  block-fast-burn:
    description: Block when a page-severity burn is active.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: ${{ github.action_path }}/../../../go.mod

    - name: Build slo-autopilot
      shell: bash
      run: |
        cd "${{ github.action_path }}/../../.."
        go build -o "${RUNNER_TEMP}/slo-autopilot" ./cmd/slo-autopilot

    - name: Evaluate error-budget gate
      shell: bash
      # Inputs are passed via env, never interpolated into the shell, so a value
      # like a spec path can't be parsed as a command (Actions injection).
      env:
        SPEC: ${{ inputs.spec }}
        PROM_URL: ${{ inputs.prometheus-url }}
        POLICY: ${{ inputs.policy }}
        MIN_REMAINING: ${{ inputs.min-remaining }}
        BLOCK_FAST_BURN: ${{ inputs.block-fast-burn }}
      run: |
        "${RUNNER_TEMP}/slo-autopilot" gate \
          -f "$SPEC" \
          --prometheus "$PROM_URL" \
          --policy "$POLICY" \
          --min-remaining "$MIN_REMAINING" \
          --block-fast-burn="$BLOCK_FAST_BURN"
