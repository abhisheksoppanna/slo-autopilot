# Demo Prometheus config. Short intervals so the burn-rate alerts react within
# the few-minute window of the `--policy fast` rules.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: payment-api
    static_configs:
      - targets: ["payment-api:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
